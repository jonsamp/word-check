name: Release to app stores

on:
  push:
    branches: [main]

jobs:
  resolve_version:
    name: Resolve app version
    environment: production
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: eas/checkout
      - name: Check ASC and resolve version
        id: check
        run: |
          cat > /tmp/resolve-version.js << 'SCRIPT'
          const crypto = require("crypto");
          const fs = require("fs");

          const APPLE_APP_ID = "1489890340";

          // 1. Read current version from app.config.ts
          const content = fs.readFileSync("app.config.ts", "utf8");
          const versionMatch = content.match(/process\.env\.APP_VERSION\s*\|\|\s*["']([^"']+)["']/);
          if (!versionMatch) {
            console.error("Could not find APP_VERSION fallback in app.config.ts");
            process.exit(1);
          }
          const currentVersion = versionMatch[1];
          console.error("Current version from app.config.ts: " + currentVersion);

          const [major, minor] = currentVersion.split(".");
          let currentMinor = parseInt(minor, 10);
          console.error("Major: " + major + ", Minor: " + currentMinor);

          // 2. Generate JWT for ASC API
          const key = fs.readFileSync(process.env.ASC_API_KEY_P8, "utf8");
          const header = { alg: "ES256", kid: process.env.ASC_API_KEY_ID, typ: "JWT" };
          const now = Math.floor(Date.now() / 1000);
          const payload = { iss: process.env.ASC_API_ISSUER_ID, iat: now, exp: now + 1200, aud: "appstoreconnect-v1" };
          const toBase64Url = (obj) => Buffer.from(JSON.stringify(obj)).toString("base64url");
          const headerEnc = toBase64Url(header);
          const payloadEnc = toBase64Url(payload);
          const input = headerEnc + "." + payloadEnc;
          const sign = crypto.createSign("SHA256");
          sign.update(input);
          const sig = sign.sign({ key, dsaEncoding: "ieee-p1363" }, "base64url");
          const jwt = input + "." + sig;

          // 3. Check versions against ASC API
          async function checkVersion(version) {
            const url = "https://api.appstoreconnect.apple.com/v1/apps/" + APPLE_APP_ID +
              "/appStoreVersions?filter[versionString]=" + version + "&filter[platform]=IOS";
            const response = await fetch(url, {
              headers: {
                "Authorization": "Bearer " + jwt,
                "Content-Type": "application/json",
              },
            });
            if (!response.ok) {
              const text = await response.text();
              console.error("ASC API returned HTTP " + response.status + ": " + text);
              process.exit(1);
            }
            const body = await response.json();
            const submitted = (body.data || []).filter(
              (entry) => entry.attributes.appStoreState !== "PREPARE_FOR_SUBMISSION"
            );
            return submitted.length;
          }

          // 4. Bump minor until we find an available version
          async function resolve() {
            let version = currentVersion;
            while (true) {
              console.error("Checking if " + version + " exists on ASC...");
              const count = await checkVersion(version);
              if (count === 0) {
                console.error("Version " + version + " is available");
                console.log(version);
                return;
              }
              console.error("Version " + version + " already submitted on ASC");
              currentMinor++;
              version = major + "." + currentMinor;
            }
          }

          resolve();
          SCRIPT

          VERSION=$(node /tmp/resolve-version.js)
          echo "Resolved version: $VERSION"
          set-output version "$VERSION"

  deploy_web:
    name: Deploy web
    type: deploy
    params:
      prod: true

  build_ios:
    name: Build iOS
    needs: [resolve_version]
    type: build
    env:
      APP_VERSION: ${{ needs.resolve_version.outputs.version }}
    params:
      platform: ios

  app_store:
    name: Send to App Store
    needs: [build_ios]
    type: testflight
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}

  build_android:
    name: Build Android
    needs: [resolve_version]
    type: build
    env:
      APP_VERSION: ${{ needs.resolve_version.outputs.version }}
    params:
      platform: android

  play_store:
    name: Send to Play Store
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
